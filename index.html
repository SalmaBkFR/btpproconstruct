<!DOCTYPE html>
<html lang="fr">
<head>
  <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription à l'événement</title>

  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #f8f5ef;
      font-family: Arial, sans-serif;
      color: #4B3F2F;
    }
    .sf-container {
      max-width: 680px;
      margin: 0 auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      border-top: 6px solid #896D40;
    }
    .sf-title {
      font-size: 24px;
      font-weight: 700;
      color: #4B3F2F;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 24px;
    }
    .sf-note {
      font-size: 13px;
      color: #6c5b43;
      text-align: right;
      margin-bottom: 16px;
    }
    .sf-form label,
    .sf-form select,
    .sf-form input[type="text"] {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }
    .sf-form label {
      margin: 0 0 8px 0;
      font-weight: 600;
      color: #4B3F2F;
    }
    .sf-form input[type="text"],
    .sf-form select {
      padding: 12px 14px;
      border: 1px solid #d6c7ad;
      border-radius: 10px;
      font-size: 15px;
      background-color: #fffdf9;
      color: #4B3F2F;
      margin-bottom: 18px;
    }
    .sf-form input[type="text"]:focus,
    .sf-form select:focus {
      outline: none;
      border-color: #896D40;
      box-shadow: 0 0 0 3px rgba(137, 109, 64, 0.15);
    }
    .sf-form input[type="submit"] {
      width: 100%;
      background-color: #896D40;
      color: #fff;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
    }
    .sf-form input[type="submit"]:hover {
      background-color: #745b35;
    }
  </style>
</head>
<body>

  <div class="sf-container">
    <div class="sf-title">
      <strong>📝 Merci de remplir le formulaire pour confirmer votre présence à l'événement de BTP Pro Construct 🏗️</strong>
    </div>

    <div class="sf-note">* Champs obligatoires</div>

    <form class="sf-form" action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dg5000004skzZ" method="POST">

      <input type="hidden" name="oid" value="00Dg5000004skzZ">
      <input type="hidden" name="retURL" value="http://www.2pace.fr/">
      <input type="hidden" name="lead_source" value="Formulaire">
      <input type="hidden" name="assignmentRuleHeader" value="1">
      <input type="hidden" id="00Ng500000DWSkr" name="00Ng500000DWSkr" value="EVT-20260411-0001">

      <label for="first_name">Prénom</label>
      <input id="first_name" maxlength="40" name="first_name" size="20" type="text">

      <label for="last_name">Nom *</label>
      <input id="last_name" maxlength="80" name="last_name" size="20" type="text" required>

      <label for="email">Email *</label>
      <input id="email" maxlength="80" name="email" size="20" type="text" required>

      <label for="company">Entreprise *</label>
      <input id="company" maxlength="40" name="company" size="20" type="text" required>

      <label for="00Ng500000DWmRp">Industrie</label>
      <select id="00Ng500000DWmRp" name="00Ng500000DWmRp" title="Industrie">
        <option value="">--Sélectionner--</option>
        <option value="Architecture">Architecture</option>
        <option value="Bureau d'études">Bureau d'études</option>
        <option value="Gros oeuvre">Gros oeuvre</option>
        <option value="Terrassement">Terrassement</option>
        <option value="Génie civil">Génie civil</option>
        <option value="Travaux publics">Travaux publics</option>
        <option value="Géomètre">Géomètre</option>
        <option value="Electricité">Electricité</option>
        <option value="Plomberie">Plomberie</option>
        <option value="Menuiserie">Menuiserie</option>
        <option value="Peinture">Peinture</option>
        <option value="Revêtement de sol">Revêtement de sol</option>
        <option value="Isolation">Isolation</option>
        <option value="Maintenance">Maintenance</option>
        <option value="Fournisseur matériaux">Fournisseur matériaux</option>
        <option value="Distributeur matériaux">Distributeur matériaux</option>
        <option value="Fabricant matériaux">Fabricant matériaux</option>
        <option value="Location matériel">Location matériel</option>
        <option value="Immobilier / Promotion">Immobilier / Promotion</option>
        <option value="Secteur Public">Secteur Public</option>
        <option value="Autre">Autre</option>
      </select>

      <label for="00Ng500000DWSMf">Centre d'intérêt *</label>
      <select id="00Ng500000DWSMf" name="00Ng500000DWSMf" title="Centre d'intérêt" required>
        <option value="">--Sélectionner--</option>
        <option value="Infrastructure">Infrastructure</option>
        <option value="Rénovation">Rénovation</option>
        <option value="Design">Design</option>
        <option value="Sécurité">Sécurité</option>
        <option value="Réglementation">Réglementation</option>
        <option value="Immobilier commercial">Immobilier commercial</option>
        <option value="Immobilier résidentiel">Immobilier résidentiel</option>
      </select>

      <input type="submit" name="submit" value="Valider mon inscription">

    </form>
  </div>

</body>
</html>
